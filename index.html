  function saveInvoiceDraft() {
    const customerIdInput = document.getElementById("invoice-customer-id")?.value?.trim();
    const customerName = document.getElementById("invoice-customer-name")?.value?.trim();
    const customerPhone = document.getElementById("invoice-customer-phone")?.value?.trim() || "";
    const invoiceNumber = document.getElementById("invoice-number")?.value?.trim() || getNextInvoiceNumber();
    const dateValue = document.getElementById("invoice-date")?.value;
    const status = document.getElementById("invoice-status")?.value || "pending";
    const discount = parseNumber(document.getElementById("invoice-discount")?.value);
    const paidAmount = parseNumber(document.getElementById("invoice-paid")?.value);
    const note = document.getElementById("invoice-note")?.value?.trim() || "";

    if (!customerName) {
      showToast("يرجى إدخال اسم العميل", "error");
      return;
    }

    const rows = Array.from(document.querySelectorAll("#invoice-items-wrap > .grid"));
    const items = rows.map(row => {
      const name = row.querySelector(".invoice-item-name")?.value?.trim() || "";
      const qty = parseNumber(row.querySelector(".invoice-item-qty")?.value);
      const price = parseNumber(row.querySelector(".invoice-item-price")?.value);
      return {
        name,
        qty,
        price,
        total: qty * price
      };
    }).filter(i => i.name && i.qty > 0);

    if (!items.length) {
      showToast("أضف صنفًا واحدًا على الأقل", "error");
      return;
    }

    let customer = customerIdInput ? getCustomerById(customerIdInput) : null;
    if (!customer) {
      customer = (state.data.customers || []).find(c =>
        (c.name || "").trim() === customerName &&
        (customerPhone ? (c.phone || "").trim() === customerPhone : true)
      );
    }

    if (!customer) {
      customer = {
        id: uid("cust"),
        name: customerName,
        phone: customerPhone,
        address: "",
        notes: "",
        creditLimit: state.data.settings.defaultCreditLimit || 0,
        balance: 0,
        payments: [],
        manualDebts: [],
        createdAt: new Date().toISOString()
      };
      state.data.customers.push(customer);
    } else if (customerPhone && !customer.phone) {
      customer.phone = customerPhone;
    }

    const subtotal = items.reduce((a,b)=> a + Number(b.total || 0), 0);

    const invoice = {
      id: uid("inv"),
      invoiceNumber,
      customerId: customer.id,
      date: dateValue ? new Date(dateValue).toISOString() : new Date().toISOString(),
      items,
      subtotal,
      discount,
      paidAmount,
      note,
      status,
      createdAt: new Date().toISOString(),
      createdBy: state.session.userId
    };

    state.data.invoices.push(invoice);
    enqueueSyncOperation({ type: "add_invoice", payload: { invoiceId: invoice.id, invoiceNumber } });
    saveAppState();
    closeModal();
    render();
    showToast("تم حفظ الفاتورة", "success");
    if (!isLocalOnlyMode() && navigator.onLine) syncQueueToCloud();
  }

<script>
  async function exportReportsImage() {
    const area = document.getElementById("reports-export-area");
    if (!area) return;
    const canvas = await html2canvas(area, {
      scale: 2,
      backgroundColor: "#ffffff",
      useCORS: true,
      allowTaint: false
    });
    const link = document.createElement("a");
    link.href = canvas.toDataURL("image/png");
    link.download = "reports.png";
    link.click();
    showToast("تم حفظ التقرير كصورة", "success");
  }

  async function exportReportsPDF() {
    const area = document.getElementById("reports-export-area");
    if (!area) return;

    const canvas = await html2canvas(area, {
      scale: 2,
      backgroundColor: "#ffffff",
      useCORS: true,
      allowTaint: false
    });

    const imgData = canvas.toDataURL("image/png");
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF("p", "mm", "a4");

    const pageHeight = 297;
    const imgWidth = 190;
    const imgHeight = canvas.height * imgWidth / canvas.width;

    let heightLeft = imgHeight;
    let position = 10;

    pdf.addImage(imgData, "PNG", 10, position, imgWidth, imgHeight);
    heightLeft -= (pageHeight - 20);

    while (heightLeft > 0) {
      position = heightLeft - imgHeight + 10;
      pdf.addPage();
      pdf.addImage(imgData, "PNG", 10, position, imgWidth, imgHeight);
      heightLeft -= (pageHeight - 20);
    }

    pdf.save("reports.pdf");
    showToast("تم حفظ التقرير PDF", "success");
  }

  function exportReportsExcel() {
    const data = getReportsData();

    const wb = XLSX.utils.book_new();

    const summaryRows = [
      ["اسم المحل", state.data.settings.shopName || state.data.settings.companyName || ""],
      ["إجمالي الفواتير", data.totalInvoices],
      ["إجمالي المبيعات", data.totalSales],
      ["إجمالي المدفوع", data.totalPaid],
      ["إجمالي الخصومات", data.totalDiscount],
      ["إجمالي الديون", data.totalRemaining],
      ["إجمالي المشتريات", data.totalPurchases]
    ];

    const customerRows = [
      ["الزبون", "عدد الفواتير", "الإجمالي", "المدفوع", "المتبقي"],
      ...data.customerRows.map(r => [r.customerName, r.invoiceCount, r.total, r.paid, r.remaining])
    ];

    const itemRows = [
      ["الصنف", "إجمالي الكمية", "عدد مرات الظهور", "إجمالي البيع"],
      ...data.itemRows.map(r => [r.itemName, r.qty, r.invoiceCount, r.sales])
    ];

    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(summaryRows), "ملخص");
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(customerRows), "بالزبون");
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(itemRows), "بالصنف");

    XLSX.writeFile(wb, "reports.xlsx");
    showToast("تم حفظ التقرير Excel", "success");
  }

  function exportReportsWord() {
    const data = getReportsData();

    const html = `
      <html dir="rtl" lang="ar">
      <head><meta charset="utf-8"></head>
      <body>
        <h2>${escapeHtml(state.data.settings.shopName || state.data.settings.companyName || "")}</h2>
        <h3>ملخص المبيعات الكلي</h3>
        <p>إجمالي الفواتير: ${data.totalInvoices}</p>
        <p>إجمالي المبيعات: ${formatCurrency(data.totalSales)}</p>
        <p>إجمالي المدفوع: ${formatCurrency(data.totalPaid)}</p>
        <p>إجمالي الخصومات: ${formatCurrency(data.totalDiscount)}</p>
        <p>إجمالي الديون: ${formatCurrency(data.totalRemaining)}</p>

        <h3>تقرير تفصيلي بالزبون</h3>
        <table border="1" style="border-collapse:collapse;width:100%;text-align:right">
          <tr><th>الزبون</th><th>عدد الفواتير</th><th>الإجمالي</th><th>المدفوع</th><th>المتبقي</th></tr>
          ${data.customerRows.map(r => `
            <tr>
              <td>${escapeHtml(r.customerName)}</td>
              <td>${r.invoiceCount}</td>
              <td>${escapeHtml(formatCurrency(r.total))}</td>
              <td>${escapeHtml(formatCurrency(r.paid))}</td>
              <td>${escapeHtml(formatCurrency(r.remaining))}</td>
            </tr>
          `).join("")}
        </table>

        <h3>تقرير تفصيلي بالصنف</h3>
        <table border="1" style="border-collapse:collapse;width:100%;text-align:right">
          <tr><th>الصنف</th><th>إجمالي الكمية</th><th>عدد مرات الظهور</th><th>إجمالي البيع</th></tr>
          ${data.itemRows.map(r => `
            <tr>
              <td>${escapeHtml(r.itemName)}</td>
              <td>${r.qty}</td>
              <td>${r.invoiceCount}</td>
              <td>${escapeHtml(formatCurrency(r.sales))}</td>
            </tr>
          `).join("")}
        </table>
      </body>
      </html>
    `;

    const blob = new Blob(['\ufeff', html], { type: "application/msword;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "reports.doc";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1500);

  }
</script>

<script>
  function saveCachedLicense(license) {
    localStorage.setItem(LICENSE_CACHE_KEY, JSON.stringify(license));
  }

  function clearCachedLicense() {
    localStorage.removeItem(LICENSE_CACHE_KEY);
  }

  async function validateLicenseOnline(key, countLogin = true) {
    const trimmed = String(key || "").trim();
    if (!trimmed) return { ok: false, message: "يرجى إدخال المفتاح" };
    if (!navigator.onLine) return { ok: false, message: "يلزم توفر الإنترنت لأول مرة للتحقق من المفتاح" };

    await ensureFirebaseReady();
    const { ref, get, update } = window.feeFirebase;
    const installationId = generateInstallationId();

    try {
      const licenseRef = ref(firebaseDbRef, `${LICENSE_PATH}/${trimmed}`);
      const snapshot = await get(licenseRef);

      if (!snapshot.exists()) return { ok: false, message: "المفتاح غير صالح" };

      const remoteLicense = snapshot.val() || {};
      if (remoteLicense.status !== "active") return { ok: false, message: "هذا المفتاح معطل" };

      const isPermanent = !!remoteLicense.isPermanent;
      const expiresAt = isPermanent ? null : Number(remoteLicense.expiresAt || 0);
      const allowUnlimitedDevices = !!remoteLicense.allowUnlimitedDevices;
      const maxDevices = allowUnlimitedDevices ? null : Number(remoteLicense.maxDevices || 1);
      const loginCount = Number(remoteLicense.loginCount || 0);
      const syncMode = remoteLicense.syncMode || "online_sync";

      if (!isPermanent && expiresAt && Date.now() >= expiresAt) {
        return { ok: false, message: "المفتاح منتهي" };
      }

      if (countLogin && !allowUnlimitedDevices && loginCount >= maxDevices) {
        return { ok: false, message: "تم استهلاك عدد الأجهزة المسموح" };
      }

      if (countLogin) {
        const payload = {
          lastLoginAt: Date.now(),
          lastInstallationId: installationId
        };
        if (!allowUnlimitedDevices) payload.loginCount = loginCount + 1;
        await update(licenseRef, payload);
      }

      const customSnap = await get(ref(firebaseDbRef, getLicenseSettingsPath(trimmed)));
      const custom = customSnap.exists() ? (customSnap.val() || {}) : {};

      const licenseData = {
        key: trimmed,
        companyName: custom.companyName || remoteLicense.companyName || DEFAULT_SETTINGS.companyName,
        logo: remoteLicense.logo || "",
        planType: remoteLicense.planType || "regular",
        isPermanent,
        expiresAt,
        status: remoteLicense.status || "active",
        usersEnabled: !!remoteLicense.usersEnabled,
        allowUnlimitedDevices,
        maxDevices,
        syncMode,
        cachedAt: Date.now(),
        installationId
      };

      return { ok: true, license: licenseData };
    } catch (error) {
      console.error(error);
      return { ok: false, message: "تعذر التحقق من المفتاح" };
    }
  }

  function handleLicenseLoginClick() {
    handleLogin();
  }

  async function handleLogin() {
    clearLoginStatus(false);

    const key = document.getElementById("licenseKeyInput").value.trim();
    const btn = document.getElementById("loginBtn");

    btn.disabled = true;
    btn.innerHTML = `<i class="fas fa-spinner fa-spin ml-2"></i> جارٍ التحقق...`;

    try {
      const result = await validateLicenseOnline(key, true);
      if (!result.ok) {
        showLoginStatus(result.message || "تعذر تسجيل الدخول", "error", false);
        return;
      }

      saveCachedLicense(result.license);
      setForceLoginOnly(false);
      clearSessionState();
      resetStateForCurrentKey();

      state.data.settings.companyName = result.license.companyName || state.data.settings.companyName;
      state.data.settings.shopName = result.license.companyName || state.data.settings.shopName;
      if (result.license.logo) state.data.settings.logo = result.license.logo;

      state.session = getDefaultAdminSession();

      saveAppState();
      applyTheme();
      setShell("app");

      if (!isLocalOnlyMode()) {
        await pullFullStateFromCloud();
        await attachRealtimeSync();
      }

      updateConnectionUI();
      state.syncStatus = "idle";
      hideTopSync();
      render();
      showToast("تم تسجيل الدخول بنجاح", "success");
    } finally {
      btn.disabled = false;
      btn.textContent = "دخول";
    }
  }

  async function handleEmployeeLogin() {
    clearLoginStatus(true);

    const usernameInput = document.getElementById("employeeUsername");
    const passwordInput = document.getElementById("employeePassword");
    const username = usernameInput.value.trim();
    const password = passwordInput.value.trim();
    const btn = document.getElementById("employeeLoginBtn");

    if (!username || !password) {
      showLoginStatus("يرجى إدخال اسم المستخدم وكلمة المرور", "error", true);
      return;
    }

    btn.disabled = true;
    btn.innerHTML = `<i class="fas fa-spinner fa-spin ml-2"></i> جارٍ الدخول...`;

    try {
      if (!navigator.onLine) {
        showLoginStatus("دخول الموظف المباشر يحتاج إنترنت", "error", true);
        return;
      }

      await ensureFirebaseReady();
      const { ref, get } = window.feeFirebase;

      const userSnap = await get(ref(firebaseDbRef, `fee_employee_accounts/${username}`));
      if (!userSnap.exists()) {
        passwordInput.value = "";
        showLoginStatus("اسم المستخدم أو كلمة المرور غير صحيحة", "error", true);
        return;
      }

      const remoteUser = userSnap.val() || {};
      if ((remoteUser.password || "") !== password) {
        passwordInput.value = "";
        showLoginStatus("اسم المستخدم أو كلمة المرور غير صحيحة", "error", true);
        return;
      }

      if (remoteUser.isActive === false) {
        passwordInput.value = "";
        showLoginStatus("هذا الحساب معطل", "error", true);
        return;
      }

      const companyKey = remoteUser.companyKey || remoteUser.licenseKey || "";
      if (!companyKey) {
        passwordInput.value = "";
        showLoginStatus("الحساب غير مربوط بشركة", "error", true);
        return;
      }

      const licenseResult = await validateLicenseOnline(companyKey, false);
      if (!licenseResult.ok) {
        passwordInput.value = "";
        showLoginStatus("تعذر تحميل بيانات الشركة لهذا الموظف", "error", true);
        return;
      }

      saveCachedLicense(licenseResult.license);
      setForceLoginOnly(false);
      resetStateForCurrentKey();

      state.data.settings.companyName = licenseResult.license.companyName || state.data.settings.companyName;
      state.data.settings.shopName = licenseResult.license.companyName || state.data.settings.shopName;
      if (licenseResult.license.logo) state.data.settings.logo = licenseResult.license.logo;

      if (!isLocalOnlyMode()) {
        await pullFullStateFromCloud();
        await attachRealtimeSync();
      }

      let localUser = (state.data.users || []).find(u => u.username === username);

      if (!localUser) {
        localUser = {
          id: remoteUser.id || uid("user"),
          name: remoteUser.name || username,
          username,
          password,
          role: remoteUser.role || "user",
          isActive: remoteUser.isActive !== false,
          permissions: { ...(remoteUser.permissions || EMPLOYEE_DEFAULT_PERMISSIONS) },
          createdAt: remoteUser.createdAt || new Date().toISOString()
        };
        state.data.users.push(localUser);
      } else {
        localUser.name = remoteUser.name || localUser.name || username;
        localUser.password = remoteUser.password || localUser.password || password;
        localUser.role = remoteUser.role || localUser.role || "user";
        localUser.isActive = remoteUser.isActive !== false;
        localUser.permissions = {
          ...(localUser.role === "admin" ? DEFAULT_USER_PERMISSIONS : EMPLOYEE_DEFAULT_PERMISSIONS),
          ...(remoteUser.permissions || localUser.permissions || {})
        };
      }

      state.session = normalizeSession({
        userId: localUser.id,
        displayName: localUser.name || localUser.username,
        role: localUser.role || "user",
        loginSource: "employee_direct",
        permissions: {
          ...(localUser.role === "admin" ? DEFAULT_USER_PERMISSIONS : EMPLOYEE_DEFAULT_PERMISSIONS),
          ...(localUser.permissions || {})
        }
      });

      try {
        localStorage.setItem(getEmployeeLastUsernameKey(), username);
      } catch {}

      saveAppState();
      applyTheme();
      setShell("app");
      updateConnectionUI();
      state.syncStatus = "idle";
      hideTopSync();
      render();
      showToast(`مرحبًا ${state.session.displayName}`, "success");
    } finally {
      btn.disabled = false;
      btn.textContent = "دخول موظف";
    }
  }

  function restoreSavedEmployeeUsername() {
    try {
      const saved = localStorage.getItem(getEmployeeLastUsernameKey()) || "";
      const input = document.getElementById("employeeUsername");
      if (input && saved) input.value = saved;
    } catch {}
  }

  function initLoginTabs() {
    document.getElementById("licenseTabBtn").addEventListener("click", () => setLoginMode("license"));
    document.getElementById("employeeTabBtn").addEventListener("click", () => {
      setLoginMode("employee");
      restoreSavedEmployeeUsername();
    });
  }

  function bootstrapLicenseFlow() {
    const cached = getCurrentLicense();

    if (shouldForceLoginOnly()) {
      clearSessionState();
      state.session = getEmptyLoggedOutSession();
      setShell("login");
      setLoginMode(localStorage.getItem(LOGIN_MODE_KEY) || "employee");
      restoreSavedEmployeeUsername();
      return;
    }

    if (!cached) {
      clearSessionState();
      state.session = getEmptyLoggedOutSession();
      setShell("login");
      setLoginMode(localStorage.getItem(LOGIN_MODE_KEY) || "license");
      restoreSavedEmployeeUsername();
      return;
    }

    if (isLicenseExpired(cached)) {
      clearSessionState();
      document.getElementById("expiredTitle").textContent = "انتهى الاشتراك";
      document.getElementById("expiredText").textContent = "انتهت صلاحية المفتاح. يرجى إدخال مفتاح صالح.";
      setShell("expired");
      return;
    }

    resetStateForCurrentKey();

    if (cached.companyName) {
      state.data.settings.companyName = cached.companyName;
      state.data.settings.shopName = cached.companyName;
    }
    if (cached.logo && !state.data.settings.logo) {
      state.data.settings.logo = cached.logo;
    }

    const restoredSession = loadSessionState();

    if (restoredSession.loginSource === "logged_out") {
      setShell("login");
      setLoginMode(localStorage.getItem(LOGIN_MODE_KEY) || "employee");
      restoreSavedEmployeeUsername();
      return;
    }

    state.session = normalizeSession(restoredSession);

    applyTheme();
    setShell("app");
    updateConnectionUI();
    hideTopSync();

    if (isLocalOnlyMode()) {
      render();
      return;
    }

    pullFullStateFromCloud().then(() => {
      attachRealtimeSync();
      render();
    });
  }

  function init() {
    initLoginTabs();

    document.getElementById("loginBtn").addEventListener("click", handleLicenseLoginClick);
    document.getElementById("employeeLoginBtn").addEventListener("click", handleEmployeeLogin);

    document.getElementById("licenseKeyInput").addEventListener("keydown", e => {
      if (e.key === "Enter") handleLicenseLoginClick();
    });

    document.getElementById("employeeUsername").addEventListener("keydown", e => {
      if (e.key === "Enter") handleEmployeeLogin();
    });

    document.getElementById("employeePassword").addEventListener("keydown", e => {
      if (e.key === "Enter") handleEmployeeLogin();
    });

    document.getElementById("goToLoginBtn").addEventListener("click", () => {
      clearSessionState();
      clearCachedLicense();
      detachRealtimeSync();
      setForceLoginOnly(false);
      state.session = getEmptyLoggedOutSession();
      setShell("login");
      setLoginMode("license");
    });

    window.addEventListener("online", async () => {
      updateConnectionUI();
      if (!isLocalOnlyMode()) {
        await syncQueueToCloud();
        await attachRealtimeSync();
      }
      render();
    });

    window.addEventListener("offline", () => {
      updateConnectionUI();
      hideTopSync();
      render();
    });

    window.onpopstate = function() {
      if (state.screenStack.length > 1) {
        state.screenStack.pop();
        state.currentScreen = state.screenStack[state.screenStack.length - 1];
        saveAppState();
        render();
      } else {
        history.pushState(null, null, window.location.pathname);
      }
    };

    history.pushState(null, null, window.location.pathname);
    bootstrapLicenseFlow();
    restoreSavedEmployeeUsername();
    updateAlertsBadge();
  }

  init();
</script>

<script id="fee-legacy-merge-script">
(function(){
  "use strict";
  const EXTRA_KEYS = ["products","expenses","paymentAccounts","supplierPayments","suppliers"];
  const $ = (id) => document.getElementById(id);
  const $$ = (sel, root=document) => Array.from(root.querySelectorAll(sel));
  let cashierCart = [];
  let currentScanTarget = null;
  let currentScanMode = "input";
  let scanner = null;
  let scannerRunning = false;
  let lastScanCode = "";
  let lastScanTime = 0;
  const scanSound = new Audio("./qr.mp3");
  scanSound.preload = "auto";
  scanSound.volume = 1;

  function readSavedState(){
    try { return JSON.parse(localStorage.getItem(getAppStateKey()) || "null") || {}; } catch { return {}; }
  }

  function normalizeMergedData(){
    const saved = readSavedState();
    EXTRA_KEYS.forEach(key => {
      if (!Array.isArray(state.data[key])) state.data[key] = Array.isArray(saved[key]) ? saved[key] : [];
    });
    if (!state.data.meta || typeof state.data.meta !== "object") state.data.meta = {};
    if (saved.meta && !state.data.meta.lastBackupAt) state.data.meta.lastBackupAt = saved.meta.lastBackupAt || "";
    state.data.products = state.data.products.map(p => ({
      id: p.id || uid("prod"),
      code: p.code || p.barcode || "",
      barcode: p.barcode || p.code || "",
      name: p.name || "صنف بدون اسم",
      category: p.category || "عام",
      unit: p.unit || "قطعة",
      stock: Number(p.stock || 0),
      costPrice: Number(p.costPrice || p.cost || 0),
      salePrice: Number(p.salePrice || p.price || 0),
      createdAt: p.createdAt || new Date().toISOString(),
      updatedAt: p.updatedAt || p.createdAt || new Date().toISOString()
    }));
    state.data.paymentAccounts = state.data.paymentAccounts.map(a => ({
      id: a.id || uid("acc"),
      name: a.name || "حساب دفع",
      type: a.type || "cash",
      number: a.number || "",
      balance: Number(a.balance || 0),
      movements: Array.isArray(a.movements) ? a.movements : [],
      createdAt: a.createdAt || new Date().toISOString()
    }));
  }

  function patchNavigation(){
    const nav = document.querySelector(".bottom-nav");
    if (nav && !nav.dataset.feeMergedNav) {
      nav.dataset.feeMergedNav = "1";
      const addBtn = (screen, icon, label, beforeId) => {
        if ($("nav-" + screen)) return;
        const btn = document.createElement("button");
        btn.id = "nav-" + screen;
        btn.className = "flex flex-col items-center p-2 text-gray-500 nav-btn";
        btn.setAttribute("onclick", `navigate('${screen}')`);
        btn.innerHTML = `<i class="fas ${icon} text-[22px]"></i><span class="text-[10px] mt-1">${label}</span>`;
        const before = beforeId ? $(beforeId) : null;
        if (before) nav.insertBefore(btn, before); else nav.appendChild(btn);
      };
      addBtn("cashier", "fa-cash-register", "الكاشير", "nav-customers");
      addBtn("inventory", "fa-boxes-stacked", "الأصناف", "nav-customers");
      addBtn("expenses", "fa-money-bill-wave", "المصاريف", "nav-reports");
      addBtn("accounts", "fa-wallet", "الحسابات", "nav-settings");
      addBtn("supplierPayments", "fa-hand-holding-dollar", "دفعات", "nav-settings");
    }
  }

  function markActiveNav(screen){
    $$(".nav-btn").forEach(btn => {
      const id = (btn.id || "").replace(/^nav-/, "");
      const active = id === screen || (id === "customers" && screen === "customerDetail") || (id === "invoices" && screen === "invoiceDetail");
      btn.classList.toggle("text-blue-600", active);
      btn.classList.toggle("text-[var(--primary)]", active);
      btn.classList.toggle("text-gray-500", !active);
    });
  }

  function renderMergedShell(container, renderer){
    rebuildCustomerBalances();
    applyTheme();
    updateHeader();
    updatePendingSyncBadge();
    updateAlertsBadge();
    patchNavigation();
    markActiveNav(state.currentScreen);
    renderer(container);
  }

  function productSearch(q){
    const text = String(q || "").trim().toLowerCase();
    const arr = state.data.products || [];
    if (!text) return arr.slice(0, 24);
    return arr.filter(p =>
      (p.name || "").toLowerCase().includes(text) ||
      (p.barcode || "").toLowerCase().includes(text) ||
      (p.code || "").toLowerCase().includes(text) ||
      (p.category || "").toLowerCase().includes(text)
    ).slice(0, 40);
  }

  function renderTopFeatureRibbon(active=""){
    const items = [
      ["cashier","fa-cash-register","الكاشير"],
      ["inventory","fa-boxes-stacked","الأصناف"],
      ["invoices","fa-file-invoice","الفواتير"],
      ["customers","fa-users","العملاء"],
      ["expenses","fa-money-bill-wave","المصاريف"],
      ["accounts","fa-wallet","حسابات الدفع"],
      ["supplierPayments","fa-hand-holding-dollar","دفعات التجار"],
      ["reports","fa-chart-pie","التقارير"]
    ];
    return `<div class="fee-merge-ribbon no-print">${items.map(([s,i,l]) => `<button type="button" class="${active===s?'active':''}" onclick="navigate('${s}')"><i class="fas ${i}"></i><br>${l}</button>`).join("")}</div>`;
  }

  function renderCashier(el){
    normalizeMergedData();
    const q = $("fee-cashier-search")?.value || "";
    const products = productSearch(q);
    const subtotal = cashierCart.reduce((a,l)=> a + Number(l.qty || 0) * Number(l.price || 0), 0);
    const discount = parseNumber($("fee-cashier-discount")?.value || 0);
    const paidValue = $("fee-cashier-paid")?.value;
    const total = Math.max(0, subtotal - discount);
    const paid = paidValue === undefined || paidValue === "" ? total : parseNumber(paidValue);
    const remaining = Math.max(0, total - paid);
    const accountOptions = (state.data.paymentAccounts || []).map(a => `<option value="${a.id}">${escapeHtml(a.name)} - ${formatCurrency(a.balance)}</option>`).join("");
    el.innerHTML = `
      <div class="space-y-5">
        ${renderTopFeatureRibbon("cashier")}
        <div class="flex justify-between items-center gap-3 flex-wrap">
          <div><h2 class="text-2xl font-extrabold text-slate-800">الكاشير</h2><p class="text-sm text-slate-500 mt-1">بيع سريع، باركود، دين، وخصم من المخزون تلقائيًا</p></div>
          <div class="flex gap-2 flex-wrap">
            <button onclick="openFeeScanner('fee-cashier-search','cashier')" class="btn bg-slate-900 text-white px-4 py-3 rounded-2xl font-extrabold"><i class="fas fa-camera"></i> باركود</button>
            <button onclick="openManualCashierItemModal()" class="btn bg-blue-600 text-white px-4 py-3 rounded-2xl font-extrabold"><i class="fas fa-plus"></i> صنف يدوي</button>
          </div>
        </div>
        <div class="grid lg:grid-cols-[1fr_370px] gap-4 items-start">
          <div class="fee-card p-4">
            <input id="fee-cashier-search" class="input" placeholder="بحث بالاسم أو الباركود..." value="${escapeHtml(q)}" oninput="render()">
            <div class="fee-product-grid mt-4">
              ${products.map(p => `
                <button class="fee-product-tile btn" onclick="addProductToCart('${p.id}')">
                  <div class="w-12 h-12 rounded-2xl text-white flex items-center justify-center mb-3" style="background:linear-gradient(135deg,var(--primary),var(--primary-2))"><i class="fas fa-box"></i></div>
                  <div class="font-extrabold text-slate-800 truncate">${escapeHtml(p.name)}</div>
                  <div class="text-xs text-slate-500 mt-1 truncate">${escapeHtml(p.barcode || p.code || '')}</div>
                  <div class="flex justify-between items-center mt-3 text-sm"><span class="font-extrabold text-blue-700">${formatCurrency(p.salePrice)}</span><span class="badge ${Number(p.stock)>0?'badge-green':'badge-red'}">${Number(p.stock || 0)} ${escapeHtml(p.unit || '')}</span></div>
                </button>
              `).join("") || `<div class="col-span-full text-center text-slate-400 py-10">لا توجد أصناف. أضف أصناف من قسم الأصناف.</div>`}
            </div>
          </div>
          <div class="fee-card p-4 sticky top-[92px]">
            <h3 class="font-extrabold text-xl mb-3"><i class="fas fa-receipt"></i> السلة</h3>
            <div id="fee-cart-list" class="max-h-[330px] overflow-auto">
              ${cashierCart.map((l,idx)=> `
                <div class="fee-cashier-cart-line">
                  <div><div class="font-extrabold text-slate-800 truncate">${escapeHtml(l.name)}</div><div class="text-xs text-slate-500">${formatCurrency(l.price)}</div></div>
                  <input class="input" type="number" min="0.001" step="0.001" value="${l.qty}" onchange="setCartQty(${idx},this.value)">
                  <input class="input" type="number" min="0" step="0.01" value="${l.price}" onchange="setCartPrice(${idx},this.value)">
                  <button class="fee-action-chip red" onclick="removeCartLine(${idx})"><i class="fas fa-trash"></i></button>
                </div>
              `).join("") || `<div class="text-center text-slate-400 py-8">السلة فارغة</div>`}
            </div>
            <div class="mt-4 grid grid-cols-2 gap-2">
              <div><label class="block text-xs font-bold text-slate-600 mb-1">خصم</label><input id="fee-cashier-discount" class="input" type="number" step="0.01" value="${discount}" oninput="render()"></div>
              <div><label class="block text-xs font-bold text-slate-600 mb-1">مدفوع الآن</label><input id="fee-cashier-paid" class="input" type="number" step="0.01" value="${paid}" oninput="render()"></div>
            </div>
            <div class="mt-3 grid grid-cols-1 gap-2">
              <input id="fee-cashier-customer" class="input" placeholder="اسم الزبون، اتركه فارغ لكاش" oninput="showFeeCustomerQuickSuggest(this.value,'fee-cashier-cust-suggest')">
              <input id="fee-cashier-customer-id" type="hidden">
              <div id="fee-cashier-cust-suggest" class="suggestions-box hidden-force"></div>
              <select id="fee-cashier-account" class="select"><option value="">بدون حساب دفع</option>${accountOptions}</select>
            </div>
            <div class="mt-4 space-y-2 text-sm">
              <div class="flex justify-between"><span>المجموع</span><b>${formatCurrency(subtotal)}</b></div>
              <div class="flex justify-between"><span>الإجمالي</span><b class="text-blue-700">${formatCurrency(total)}</b></div>
              <div class="flex justify-between"><span>المتبقي دين</span><b class="text-red-600">${formatCurrency(remaining)}</b></div>

  function getOrCreateCustomerByName(name, phone=""){

  function addAccountMovement(accountId, type, amount, label, refId=""){
    const acc = (state.data.paymentAccounts || []).find(a=>a.id===accountId);
    if(!acc || !amount) return;
    const value = Number(amount || 0);
    acc.balance = Number(acc.balance || 0) + (type === "deposit" ? value : -value);
    acc.movements = Array.isArray(acc.movements) ? acc.movements : [];
    acc.movements.unshift({ id: uid("mov"), date:new Date().toISOString(), type, amount:value, label:label||"", refId });
  }

  function completeCashierSale(){
    normalizeMergedData();
    if(!cashierCart.length){ showToast("السلة فارغة", "error"); return; }
    const subtotal = cashierCart.reduce((a,l)=> a + Number(l.qty||0)*Number(l.price||0),0);
    const discount = parseNumber($("fee-cashier-discount")?.value || 0);
    const total = Math.max(0, subtotal - discount);
    const paid = Math.min(total, parseNumber($("fee-cashier-paid")?.value || total));
    const customer = getOrCreateCustomerByName($("fee-cashier-customer")?.value || "زبون كاش");
    const items = cashierCart.map(l=>({ productId:l.productId || "", name:l.name, qty:Number(l.qty||0), price:Number(l.price||0), costPrice:Number(l.costPrice||0), total:Number(l.qty||0)*Number(l.price||0) }));
    items.forEach(it=>{ const p=(state.data.products||[]).find(x=>x.id===it.productId); if(p) p.stock = Number(p.stock||0) - Number(it.qty||0); });
    const invoice = { id: uid("inv"), invoiceNumber: getNextInvoiceNumber(), customerId: customer.id, date:new Date().toISOString(), items, subtotal, discount, paidAmount:paid, note:"فاتورة كاشير", status: total-paid > 0 ? "pending" : "completed", source:"cashier", createdAt:new Date().toISOString(), createdBy: state.session.userId };
    state.data.invoices.push(invoice);
    const accountId = $("fee-cashier-account")?.value || "";
    if(accountId && paid > 0) addAccountMovement(accountId, "deposit", paid, `بيع فاتورة ${invoice.invoiceNumber}`, invoice.id);
    enqueueSyncOperation({ type:"add_cashier_invoice", payload:{ invoiceId:invoice.id, invoiceNumber: invoice.invoiceNumber } });
    cashierCart = [];
    saveAppState();
    render();
    showToast("تم حفظ فاتورة الكاشير", "success");
    if(!isLocalOnlyMode() && navigator.onLine) syncQueueToCloud();
  }

  function mergeArrayByIdentity(current=[], incoming=[]){
    const out = [...current];
    const keyOf = (x) => x.id || x.invoiceNumber || x.barcode || x.code || x.name || JSON.stringify(x);
    incoming.forEach(item=>{
      const k=keyOf(item); const idx=out.findIndex(x=>keyOf(x)===k);
      if(idx>=0){
        const merged = { ...out[idx], ...item };
        ["payments","manualDebts","movements","items"].forEach(key=>{ if(Array.isArray(out[idx][key]) || Array.isArray(item[key])) merged[key] = mergeArrayByIdentity(out[idx][key]||[], item[key]||[]); });
        out[idx]=merged;
      } else out.push(item);
    });
    return out;
  }
  async function importFeeFullBackupFile(file){

  function productStockText(p){

      return pieces ? `${cartons} كرتونة + ${pieces} قطعة` : `${cartons} كرتونة`;

    return `${Number(stock.toFixed(3))} ${baseUnitLabel(p)}`;

  function proCalculateInvoiceTotals(invoice){
    const subtotal = Number(invoice?.subtotalBase ?? invoice?.subtotal ?? 0) || 0;
    const discount = Number(invoice?.discountBase ?? invoice?.discount ?? 0) || 0;
    const total = Math.max(0, subtotal - discount);
    const paid = Number(invoice?.paidBase ?? invoice?.paidAmount ?? 0) || 0;
    const remaining = Math.max(0, total - paid);
    return { subtotal, discount, total, paid, remaining };
  }

      const manual = (c.manualDebts||[]).reduce((a,d)=>a+toBase(d.amount||0, d.currency||getBaseCurrency().code),0);
      const payments = (c.payments||[]).reduce((a,p)=>a+toBase(p.amount||0, p.currency||getBaseCurrency().code),0);
      c.balance = Math.max(0, invoices + manual - payments);

  let __feeDownloadSerial = 0;
  function makeUniqueDownloadName(filename){
    const raw = String(filename || 'download.bin').replace(/[\/:*?"<>|]+/g, '_').trim() || 'download.bin';
    const dot = raw.lastIndexOf('.');
    const stamp = new Date().toISOString().replace(/[-:.TZ]/g,'').slice(0,14) + '_' + (++__feeDownloadSerial);
    return dot > 0 ? raw.slice(0,dot) + '_' + stamp + raw.slice(dot) : raw + '_' + stamp;
  }
  function robustDownloadBlob(blob, filename){
    try{
      if(!(blob instanceof Blob) || !blob.size){
        throw new Error('Empty download blob');
      }
      const safeName = makeUniqueDownloadName(filename);
      let fileBlob = blob;
      try { fileBlob = new File([blob], safeName, { type: blob.type || 'application/octet-stream' }); } catch(e) {}
      const url = URL.createObjectURL(fileBlob);
      const a = document.createElement("a");
      a.href = url;
      a.download = safeName;
      a.rel = "noopener";
      a.style.cssText = "position:fixed;left:-99999px;top:-99999px;width:1px;height:1px;opacity:0;pointer-events:none";
      document.body.appendChild(a);
      a.click();
      setTimeout(()=>{ try{ a.remove(); }catch(e){} }, 1500);
      setTimeout(()=>{ try{ URL.revokeObjectURL(url); }catch(e){} }, 60000);
      return true;
    }catch(err){
      console.error(err);
      try{
        const reader = new FileReader();
        reader.onload = function(){
          const opened = window.open(reader.result, "_blank");
          if(!opened) showToast('المتصفح منع التنزيل، اسمح بالنوافذ المنبثقة أو جرّب مرة ثانية', 'warning');
        };
        reader.readAsDataURL(blob);
      }catch(e){}
      return false;
    }
  }
  function canvasToBlob(canvas, type="image/png", quality=.92){
    return new Promise(resolve => {
      if(canvas.toBlob) canvas.toBlob(b=>resolve(b), type, quality);
      else {
        const bin = atob(canvas.toDataURL(type, quality).split(',')[1]);
        const arr = new Uint8Array(bin.length);
        for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
        resolve(new Blob([arr], {type}));
      }
    });
  }
  function toBWCanvas(canvas){
    try{
      const out = document.createElement('canvas'); out.width = canvas.width; out.height = canvas.height;
      const ctx = out.getContext('2d'); ctx.drawImage(canvas,0,0);
      const img = ctx.getImageData(0,0,out.width,out.height);
      for(let i=0;i<img.data.length;i+=4){
        const gray = img.data[i]*.299 + img.data[i+1]*.587 + img.data[i+2]*.114;
        const v = gray > 168 ? 255 : 0;
        img.data[i]=img.data[i+1]=img.data[i+2]=v;
      }
      ctx.putImageData(img,0,0);
      return out;
    }catch(e){ console.warn(e); return canvas; }
  }

    return opts.bw ? toBWCanvas(canvas) : canvas;
  }

  function addAccountMovementPro(accountId,type,amount,currency,label,refId=''){
    const acc=arr('paymentAccounts').find(a=>a.id===accountId); if(!acc||!amount)return;
    const base = toBase(amount,currency||getBaseCurrency().code);
    const accountAmount = base / getCurrency(acc.currency||getBaseCurrency().code).rateToBase;
    acc.balance = Number(acc.balance||0) + (type==='deposit'?accountAmount:-accountAmount);
    acc.movements = Array.isArray(acc.movements)?acc.movements:[];
    acc.movements.unshift({id:uid('mov'),date:nowISO(),type,amount:accountAmount,currency:acc.currency||getBaseCurrency().code,baseAmount:base,label,refId});
  }
  function reverseMovementsByRef(refId){ arr('paymentAccounts').forEach(acc=>{ const remain=[]; (acc.movements||[]).forEach(m=>{ if(m.refId===refId){ acc.balance = Number(acc.balance||0) + (m.type==='deposit' ? -Number(m.amount||0) : Number(m.amount||0)); } else remain.push(m); }); acc.movements=remain; }); }

  window.savePurchasePro = function(){ const productId=$('pur-product')?.value||''; const product=arr('products').find(p=>p.id===productId); const qty=num($('pur-qty')?.value); const amount=num($('pur-amount')?.value); if(!product||!qty){showToast('اختر الصنف والكمية','error');return;} const currency=$('pur-currency')?.value||getBaseCurrency().code; const paid=num($('pur-paid')?.value||amount); const addedStock = product.unitType==='carton' ? qty*Math.max(1,product.piecesPerCarton) : qty; product.stock=Number(product.stock||0)+addedStock; const r={id:uid('pur'),supplierName:$('pur-supplier')?.value?.trim()||'',productId,productName:product.name,qty,stockAdded:addedStock,amount,paidAmount:paid,currency,accountId:$('pur-account')?.value||'',date:$('pur-date')?.value?new Date($('pur-date').value).toISOString():nowISO(),note:$('pur-note')?.value?.trim()||'',createdAt:nowISO()}; state.data.purchases.push(r); if(r.accountId&&paid>0) addAccountMovementPro(r.accountId,'withdraw',paid,currency,`مشتريات: ${product.name}`,r.id); closeModal(); refreshShortages(false); syncAndSave('add_purchase',{id:r.id,productId}); };

  function collectPeriod(){ const from=$('report-filter-from')?.value; const to=$('report-filter-to')?.value; return {from,to}; }
  function inPeriod(dateStr, f){ const d=new Date(dateStr); if(f.from){const from=new Date(f.from+'T00:00:00'); if(d<from)return false;} if(f.to){const to=new Date(f.to+'T23:59:59'); if(d>to)return false;} return true; }
  function getReportsDataPro(){ normalizeProData(); rebuildAllBalances(); const f=collectPeriod(); const invoices=arr('invoices').filter(i=>inPeriod(i.date,f)); const sales=invoices.reduce((a,i)=>a+proCalculateInvoiceTotals(i).total,0); const paid=invoices.reduce((a,i)=>a+proCalculateInvoiceTotals(i).paid,0); const remaining=invoices.reduce((a,i)=>a+proCalculateInvoiceTotals(i).remaining,0); const discounts=invoices.reduce((a,i)=>a+proCalculateInvoiceTotals(i).discount,0); const cogs=invoices.flatMap(i=>i.items||[]).reduce((a,it)=>a+Number(it.costBase ?? toBase(Number(it.costPrice||0)*Number(it.qty||0),it.costCurrency||it.currency||getBaseCurrency().code)),0); const expenses=arr('expenses').filter(e=>e.type!=='wage'&&inPeriod(e.date,f)).reduce((a,e)=>a+toBase(e.amount,e.currency),0); const wages=arr('wages').filter(w=>inPeriod(w.date,f)).reduce((a,w)=>a+toBase(w.amount,w.currency),0); const purchases=arr('purchases').filter(p=>inPeriod(p.date,f)).reduce((a,p)=>a+toBase(p.amount,p.currency),0); const gross=sales-cogs; const net=gross-expenses-wages-purchases; const accountIn=allMovements().filter(m=>m.type==='deposit'&&inPeriod(m.date,f)).reduce((a,m)=>a+Number(m.baseAmount??toBase(m.amount,m.currency)),0); const accountOut=allMovements().filter(m=>m.type!=='deposit'&&inPeriod(m.date,f)).reduce((a,m)=>a+Number(m.baseAmount??toBase(m.amount,m.currency)),0); const customerMap={}; invoices.forEach(inv=>{const c=getCustomerById(inv.customerId)||{}; const key=inv.customerId||'unknown'; if(!customerMap[key]) customerMap[key]={customerName:c.name||'عميل غير معروف',invoiceCount:0,total:0,paid:0,remaining:0}; const t=proCalculateInvoiceTotals(inv); customerMap[key].invoiceCount++; customerMap[key].total+=t.total; customerMap[key].paid+=t.paid; customerMap[key].remaining+=t.remaining;}); const itemMap={}; invoices.forEach(inv=>(inv.items||[]).forEach(it=>{const k=it.name||'غير محدد'; if(!itemMap[k]) itemMap[k]={itemName:k,qty:0,sales:0,cost:0,profit:0,invoiceCount:0}; itemMap[k].qty+=Number(it.qty||0); itemMap[k].sales+=Number(it.totalBase??toBase(it.total||0,it.currency)); itemMap[k].cost+=Number(it.costBase||0); itemMap[k].profit=itemMap[k].sales-itemMap[k].cost; itemMap[k].invoiceCount++;})); return {filters:f,filteredInvoices:invoices,totalInvoices:invoices.length,totalCustomers:arr('customers').length,totalSales:sales,totalPaid:paid,totalRemaining:remaining,totalDiscount:discounts,totalCost:cogs,grossProfit:gross,expenses,wages,totalPurchases:purchases,netProfit:net,accountIn,accountOut,customerRows:Object.values(customerMap).sort((a,b)=>b.remaining-a.remaining),itemRows:Object.values(itemMap).sort((a,b)=>b.sales-a.sales),shortages:getShortageProducts()}; }

  window.saveInvoiceStatusChange = function(invoiceId){ const inv=getInvoiceById(invoiceId); if(!inv)return; const newStatus=$('invoice-status-change')?.value||'pending'; if(newStatus==='completed'){ const t=proCalculateInvoiceTotals(inv); inv.paidAmount=t.total; inv.paidBase=t.total; inv.status='completed'; } else inv.status=newStatus; inv.updatedAt=nowISO(); closeModal(); syncAndSave('change_invoice_status',{invoiceId,status:inv.status}); showToast(newStatus==='completed'?'تم تحويل الفاتورة لمكتملة وخصمها من الدين':'تم تحديث حالة الفاتورة','success'); };

  function buildAllCustomerInvoicesHTMLPro(){ rebuildAllBalances(); const rows=arr('customers').filter(c=>Number(c.balance||0)>0).sort((a,b)=>Number(b.balance||0)-Number(a.balance||0)); const total=rows.reduce((a,c)=>a+Number(c.balance||0),0); return `<div class="fee-report-export"><div class="fee-report-header"><div style="display:flex;gap:14px;align-items:center">${logoHTML('fee-report-logo')}<div><div class="fee-report-title">${esc(state.data.settings.shopName||state.data.settings.companyName||'')}</div><div class="fee-report-sub">كشف عام بديون الزبائن<br>${formatDate(nowISO())}</div></div></div><div class="font-extrabold text-red-600">${baseMoney(total)}</div></div><table class="fee-lite-table"><thead><tr><th>الزبون</th><th>الهاتف</th><th>المبلغ المطلوب</th></tr></thead><tbody>${rows.map(c=>`<tr><td>${esc(c.name)}</td><td>${esc(c.phone||'-')}</td><td>${baseMoney(c.balance)}</td></tr>`).join('')||'<tr><td colspan="3">لا توجد ديون</td></tr>'}</tbody><tfoot><tr><td colspan="2"><b>الإجمالي</b></td><td><b>${baseMoney(total)}</b></td></tr></tfoot></table></div>`; }

  window.downloadAllCustomerInvoicesExcel = function(){ rebuildAllBalances(); const rows=[['الزبون','الهاتف','إجمالي الدين'],...arr('customers').filter(c=>Number(c.balance||0)>0).map(c=>[c.name,c.phone||'',Number(c.balance||0)])]; const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(rows),'ديون الزبائن'); const out=XLSX.write(wb,{bookType:'xlsx',type:'array'}); robustDownloadBlob(new Blob([out],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'}),'all_customer_debts.xlsx'); showToast('تم تنزيل كشف الديون Excel','success'); };

  function appendSettingsPro(){ if($('fee-pro-settings-card'))return; const container=$('app-container'); if(!container)return; normalizeProData(); const div=document.createElement('div'); div.id='fee-pro-settings-card'; div.className='section-card p-4 mt-5'; div.innerHTML=`<div class="flex justify-between items-center gap-3 flex-wrap"><div><h3 class="text-xl font-extrabold">العملات وسعر الصرف</h3><p class="text-sm text-slate-500 mt-1">الأساسية شيكل، ويمكن البيع والإضافة والتصدير بعملة مختلفة مع تحويلها للتقارير</p></div><button onclick="showCurrencyModalPro()" class="btn bg-blue-600 text-white px-4 py-3 rounded-2xl font-extrabold"><i class="fas fa-plus"></i> عملة</button></div><div class="fee-table-wrap mt-4"><table class="table-modern"><thead><tr><th>العملة</th><th>الرمز</th><th>سعر الصرف مقابل الشيكل</th><th>أساسية</th><th>إجراءات</th></tr></thead><tbody>${arr('currencies').map(c=>`<tr><td class="font-extrabold">${esc(c.name)} (${esc(c.code)})</td><td>${esc(c.symbol)}</td><td>${c.rateToBase}</td><td>${c.isBase?'نعم':'-'}</td><td><button class="fee-action-chip blue" onclick="showCurrencyModalPro('${c.id}')">تعديل</button>${c.isBase?'':`<button class="fee-action-chip red" onclick="deleteCurrencyPro('${c.id}')">حذف</button>`}</td></tr>`).join('')}</tbody></table></div>`; container.appendChild(div); }

  window.saveCurrencyPro = function(){ const id=$('cur-id')?.value||''; const name=$('cur-name')?.value?.trim(); const code=($('cur-code')?.value?.trim()||'').toUpperCase(); if(!name||!code){showToast('أدخل اسم وكود العملة','error');return;} const payload={id:id||uid('cur'),name,code,symbol:$('cur-symbol')?.value?.trim()||code,rateToBase:num($('cur-rate')?.value)||1,isBase:id?(arr('currencies').find(c=>c.id===id)?.isBase||false):false,updatedAt:nowISO()}; const i=arr('currencies').findIndex(c=>c.id===id); if(i>=0) state.data.currencies[i]={...state.data.currencies[i],...payload}; else state.data.currencies.push({...payload,createdAt:nowISO()}); closeModal(); syncAndSave(i>=0?'edit_currency':'add_currency',{id:payload.id}); };
  window.deleteCurrencyPro = function(id){ confirmDialog({title:'حذف العملة',message:'هل تريد حذف العملة؟',confirmText:'حذف',onConfirm:()=>{state.data.currencies=arr('currencies').filter(c=>c.id!==id); syncAndSave('delete_currency',{id});}}); };

  const previousRender = window.render;
  window.render = function(){
    normalizeProData(); ensureSideMenu();
    const container=$('app-container');
    const custom={cashier:renderCashierPro,inventory:renderInventoryPro,expenses:renderExpensesPro,accounts:renderAccountsPro,supplierPayments:renderSupplierPaymentsPro,workers:renderWorkersPro,purchases:renderPurchasesPro,shortages:renderShortagesPro,reports:renderReportsPro};
    if(container && custom[state.currentScreen]){ rebuildAllBalances(); applyTheme(); updateHeader(); updatePendingSyncBadge(); updateAlertsBadge(); custom[state.currentScreen](container); ensureSideMenu(); return; }
    previousRender(); ensureSideMenu(); if(state.currentScreen==='settings') appendSettingsPro();
  };

  const oldOpenQuick = window.openQuickActions;
  window.openQuickActions = function(){ openModal({title:'إجراءات سريعة',body:`<div class="grid grid-cols-2 gap-3"><button onclick="closeModal();navigate('cashier')" class="btn fancy-card rounded-[24px] p-4 text-right"><div class="font-extrabold">الكاشير</div></button><button onclick="closeModal();showProductModalPro()" class="btn fancy-card rounded-[24px] p-4 text-right"><div class="font-extrabold">صنف جديد</div></button><button onclick="closeModal();showPurchaseModalPro()" class="btn fancy-card rounded-[24px] p-4 text-right"><div class="font-extrabold">مشتريات</div></button><button onclick="closeModal();showExpenseModalPro()" class="btn fancy-card rounded-[24px] p-4 text-right"><div class="font-extrabold">مصروف</div></button><button onclick="closeModal();showExpenseModalPro('wage')" class="btn fancy-card rounded-[24px] p-4 text-right"><div class="font-extrabold">أجر عامل</div></button><button onclick="closeModal();showAccountModalPro()" class="btn fancy-card rounded-[24px] p-4 text-right"><div class="font-extrabold">حساب دفع</div></button></div>`}); };

  Object.assign(window,{showProductModal:window.showProductModalPro,saveProduct:window.saveProductPro,deleteProduct:window.deleteProductPro,exportInventoryExcel:window.exportInventoryExcelPro,showExpenseModal:window.showExpenseModalPro,saveExpense:window.saveExpensePro,deleteExpense:window.deleteExpensePro,showAccountModal:window.showAccountModalPro,saveAccount:window.saveAccountPro,showSupplierPaymentModal:window.showSupplierPaymentModalPro,saveSupplierPayment:window.saveSupplierPaymentPro,deleteSupplierPayment:window.deleteSupplierPaymentPro,addProductToCart:window.addProductToCartPro,clearCashierCart:window.clearCashierCartPro,completeCashierSale:window.completeCashierSalePro});

  window.addEventListener('barcode:scanned', (ev)=>{
    try{
      if(state.currentScreen !== 'cashier') return;
      const code = String(ev.detail?.code || '');
      if(!code) return;
      const p = arr('products').find(x => String(x.barcode||x.code||'') === code);
      if(p) window.addProductToCartPro(p.id);
    }catch(e){ console.warn(e); }
  });
  window.addEventListener('online',()=>{ normalizeProData(); rebuildAllBalances(); saveAppState(); if(state.queue&&state.queue.length&&!isLocalOnlyMode()) setTimeout(()=>syncQueueToCloud(),250); });
  document.addEventListener('DOMContentLoaded',()=>{ normalizeProData(); ensureSideMenu(); });
  try{ normalizeProData(); ensureSideMenu(); }catch(e){ console.error(e); }
})();
</script>

<script id="fee-final-mobile-export-patch-script">
(function(){
  'use strict';
  const $ = id => document.getElementById(id);
  const safeText = v => String(v ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
  const n = v => { const x = parseFloat(v); return Number.isFinite(x) ? x : 0; };
  const stamp = () => new Date().toISOString().replace(/[-:.TZ]/g,'').slice(0,14) + '_' + Math.random().toString(36).slice(2,6);
  const baseCur = () => (state?.data?.currencies || []).find(c=>c.isBase) || {code:'ILS', name:'شيكل', symbol:'₪', rateToBase:1};
  const curBy = code => (state?.data?.currencies || []).find(c=>c.code===code) || baseCur();
  const money = (amount, code) => `${Number(amount||0).toLocaleString('en-US')} ${(curBy(code||baseCur().code).symbol || code || '₪')}`;
  const baseMoney2 = amount => money(amount, baseCur().code);
  const toBase2 = (amount, code) => n(amount) * (n(curBy(code).rateToBase) || 1);
  function arr2(k){ if(!Array.isArray(state.data[k])) state.data[k] = []; return state.data[k]; }
  function todayLocal(){ const d=new Date(); d.setMinutes(d.getMinutes()-d.getTimezoneOffset()); return d.toISOString().slice(0,16); }
  function fmtDate(v){ try { return typeof formatDate === 'function' ? formatDate(v) : new Date(v).toLocaleString('ar-EG'); } catch { return v || ''; } }
  function toast(msg,type='success'){ try{ showToast(msg,type); }catch{ console.log(msg); } }
  function normalizeBasics(){
    ['products','expenses','paymentAccounts','supplierPayments','suppliers','workers','wages','wageRules','shortages','currencies','accountMovements','purchases'].forEach(arr2);
    if(!arr2('currencies').length) state.data.currencies.push({id:'cur_ils',code:'ILS',name:'شيكل',symbol:'₪',rateToBase:1,isBase:true});
  }
  function feeSave(type='update', payload={}){
    try{ if(typeof rebuildCustomerBalances === 'function') rebuildCustomerBalances(); }catch{}
    try{ enqueueSyncOperation({type,payload}); }catch{}
    try{ saveAppState(); }catch{}
    try{ updatePendingSyncBadge(); updateAlertsBadge(); }catch{}
    try{ if(!isLocalOnlyMode() && navigator.onLine) setTimeout(()=>syncQueueToCloud(),120); }catch{}
    try{ render(); }catch{}
  }
  function accountName(id){ const a=arr2('paymentAccounts').find(x=>x.id===id); return a ? a.name : 'بدون حساب'; }
  function addAccountMove(accountId,type,amount,currency,label,refId=''){
    if(!accountId || !amount) return;
    const a = arr2('paymentAccounts').find(x=>x.id===accountId); if(!a) return;
    const baseAmount = toBase2(amount,currency || a.currency || baseCur().code);
    const sign = type === 'deposit' ? 1 : -1;
    a.balance = n(a.balance) + (sign * baseAmount);
    const m = {id:'mov_'+Date.now()+'_'+Math.random().toString(36).slice(2,7),accountId,type,amount:baseAmount,currency:baseCur().code,label,refId,date:new Date().toISOString()};
    if(!Array.isArray(a.movements)) a.movements=[];
    a.movements.push(m); arr2('accountMovements').push(m);
  }
  function uniqueName(name){
    const raw = String(name || 'download.bin').replace(/[\\/:*?"<>|]+/g,'_').trim() || 'download.bin';
    const dot = raw.lastIndexOf('.');
    return dot > 0 ? raw.slice(0,dot)+'_'+stamp()+raw.slice(dot) : raw+'_'+stamp();
  }
  function prepareDownloadWindow(title='جاري تجهيز الملف'){
    let w=null;
    try{
      w = window.open('', '_blank');
      if(w && w.document){
        w.document.open();
        w.document.write(`<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>${safeText(title)}</title><style>body{font-family:Arial,sans-serif;background:#f8fafc;color:#0f172a;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;text-align:center}.box{background:#fff;border:1px solid #e5e7eb;border-radius:24px;padding:22px;box-shadow:0 16px 45px rgba(15,23,42,.12);max-width:360px}.spin{width:38px;height:38px;border:4px solid #dbeafe;border-top-color:#2563eb;border-radius:50%;animation:s 1s linear infinite;margin:0 auto 14px}@keyframes s{to{transform:rotate(360deg)}}a{display:inline-flex;margin-top:14px;background:#2563eb;color:#fff;text-decoration:none;padding:12px 18px;border-radius:16px;font-weight:800}</style></head><body><div class="box"><div class="spin"></div><b>جاري تجهيز الملف...</b><p style="color:#64748b;line-height:1.8">لا تغلق هذه الصفحة حتى يبدأ التنزيل.</p></div></body></html>`);
        w.document.close();
      }
    }catch(e){ w=null; }
    return w;
  }
  function downloadBlob(blob, filename, ticket=null){
    if(!(blob instanceof Blob) || blob.size === 0){ toast('الملف فارغ ولم يتم تنزيله','error'); return false; }
    const safe = uniqueName(filename);
    const url = URL.createObjectURL(blob);
    const makeAnchor = (doc=document) => {
      const a = doc.createElement('a');
      a.href = url;
      a.download = safe;
      a.target = '_self';
      a.rel = 'noopener';
      a.textContent = 'تنزيل الملف';
      a.style.cssText = 'position:fixed;left:12px;bottom:12px;z-index:2147483647;background:#2563eb;color:#fff;padding:12px 16px;border-radius:14px;font-weight:800;text-decoration:none;font-family:Arial,sans-serif';
      return a;
    };
    const clickAnchor = (a) => {
      try{
        a.dispatchEvent(new MouseEvent('click', {bubbles:true, cancelable:true, view:window}));
        return true;
      }catch(e){
        try{ a.click(); return true; }catch(err){ console.warn(err); return false; }
      }
    };
    const direct = () => {
      let ok = false;

<script id="fee-absolutely-final-nav-status-fix-script">
(function(){
  'use strict';
  const $ = (id) => document.getElementById(id);
  const bottomItems = [
    ['home','fa-home','الرئيسية'],
    ['cashier','fa-cash-register','الكاشير'],
    ['inventory','fa-boxes-stacked','الأصناف'],
    ['invoices','fa-file-invoice','الفواتير'],
    ['customers','fa-users','العملاء']
  ];
  const sideItems = [
    ['home','fa-home','الرئيسية'],
    ['cashier','fa-cash-register','الكاشير'],
    ['inventory','fa-boxes-stacked','الأصناف والمخزون'],
    ['customers','fa-users','العملاء والديون'],
    ['invoices','fa-file-invoice','الفواتير'],
    ['reports','fa-chart-pie','التقارير'],
    ['purchases','fa-truck-ramp-box','المشتريات'],
    ['shortages','fa-triangle-exclamation','البضاعة الناقصة'],
    ['expenses','fa-money-bill-wave','المصاريف'],
    ['workers','fa-users-gear','أجور العمال'],
    ['accounts','fa-wallet','حسابات الدفع'],
    ['supplierPayments','fa-hand-holding-dollar','دفعات التجار'],
    ['settings','fa-cog','الإعدادات']
  ];
  let navLock = false;

  function getScreen(){
    try{
      if (typeof state !== 'undefined' && state && state.currentScreen) return state.currentScreen;
    }catch(e){}
    return 'home';
  }

  function isActive(key){
    const cur = getScreen();
    return key === cur || (key === 'customers' && cur === 'customerDetail') || (key === 'invoices' && cur === 'invoiceDetail');
  }

  function buildBottomNav(){
    const nav = document.querySelector('.bottom-nav');
    if(!nav) return;
    const wanted = bottomItems.map(([key,icon,label]) =>
      `<button onclick="navigate('${key}')" class="flex flex-col items-center p-2 nav-btn" id="nav-${key}" type="button"><i class="fas ${icon} text-[22px]"></i><span class="text-[10px] mt-1">${label}</span></button>`
    ).join('');
    if(nav.getAttribute('data-fee-bottom-final-real') !== '1' || nav.innerHTML.indexOf('nav-customers') === -1 || nav.innerHTML.indexOf('nav-reports') !== -1 || nav.children.length !== 5){
      navLock = true;
      nav.innerHTML = wanted;
      nav.setAttribute('data-fee-bottom-final-real','1');
      setTimeout(()=>{navLock=false;},0);
    }
    applyActiveBottomNav();
  }

  function applyActiveBottomNav(){
    const nav = document.querySelector('.bottom-nav');
    if(!nav) return;
    nav.querySelectorAll('.nav-btn').forEach(btn => {
      const key = (btn.id || '').replace(/^nav-/, '');
      const active = isActive(key);
      btn.classList.toggle('fee-bottom-active', active);
      btn.classList.toggle('text-blue-600', active);
      btn.classList.toggle('text-gray-500', !active);
      btn.style.color = active ? 'var(--primary)' : '#6b7280';
    });
  }

  function updateConnectionChip(){
    const header = document.querySelector('header.glass-header');
    if(!header) return;

    const oldDot = $('connectionDot');
    const oldText = $('connectionText');
    if(oldDot) oldDot.classList.add('fee-header-hidden-status');
    if(oldText) oldText.classList.add('fee-header-hidden-status');

    const actions = header.querySelector('div.flex.items-center.gap-2') || header.lastElementChild;
    if(!actions) return;
    let chip = $('feeConnectionChipFinal');
    if(!chip){
      chip = document.createElement('span');
      chip.id = 'feeConnectionChipFinal';
    }
    const online = navigator.onLine;
    let txt = (oldText && oldText.textContent && oldText.textContent.trim()) || (online ? 'متصل' : 'غير متصل');
    if(!online && (txt === 'متصل' || txt === 'أونلاين')) txt = 'غير متصل';
    chip.classList.toggle('offline', !online);
    chip.innerHTML = `<span class="dot"></span><span>${txt}</span>`;

    const syncBtn = Array.from(actions.querySelectorAll('button')).find(b => (b.getAttribute('onclick') || '').includes('openSyncCenter')) || actions.querySelector('button');
    if(syncBtn){
      if(chip.parentElement !== actions || syncBtn.nextElementSibling !== chip) syncBtn.insertAdjacentElement('afterend', chip);
    }else if(chip.parentElement !== actions){
      actions.prepend(chip);
    }
  }

  function ensureSideMenu(){
    let backdrop = $('feeSideBackdrop');
    if(!backdrop){
      backdrop = document.createElement('div');
      backdrop.id = 'feeSideBackdrop';
      backdrop.className = 'no-print';
      document.body.appendChild(backdrop);
    }
    backdrop.onclick = closeSide;

    let side = $('feeSideMenu');
    if(!side){
      side = document.createElement('aside');
      side.id = 'feeSideMenu';
      side.className = 'no-print';
      document.body.appendChild(side);
    }
    const cur = getScreen();
    side.innerHTML = `<div class="fee-side-title"><span><i class="fas fa-layer-group"></i> أقسام النظام</span><button class="fee-action-chip" type="button" id="feeCloseSideBtn"><i class="fas fa-xmark"></i></button></div>` +
      sideItems.map(([key,icon,label]) => `<button class="fee-side-btn ${key===cur?'active':''}" type="button" data-fee-side-screen="${key}"><i class="fas ${icon}"></i><span>${label}</span></button>`).join('');
    const closeBtn = $('feeCloseSideBtn');
    if(closeBtn) closeBtn.onclick = closeSide;
    side.querySelectorAll('[data-fee-side-screen]').forEach(btn => {
      btn.onclick = () => {
        const screen = btn.getAttribute('data-fee-side-screen');
        closeSide();
        if(typeof navigate === 'function') navigate(screen);
      };
    });
  }

  function openSide(){
    ensureSideMenu();
    document.body.classList.add('fee-side-open');
    $('feeSideBackdrop')?.classList.add('show');
    $('feeSideMenu')?.classList.add('show');
  }
  function closeSide(){
    document.body.classList.remove('fee-side-open');
    $('feeSideBackdrop')?.classList.remove('show');
    $('feeSideMenu')?.classList.remove('show');
  }

  function compactHeader(){
    const header = document.querySelector('header.glass-header');
    if(!header) return;
    const brand = header.querySelector('.flex.items-center.gap-3') || header.firstElementChild;
    let menu = $('feeMenuToggle');
    if(!menu){
      menu = document.createElement('button');
      menu.id = 'feeMenuToggle';
      menu.type = 'button';
      menu.innerHTML = '<i class="fas fa-bars text-lg"></i>';
    }
    menu.className = 'p-2 hover:bg-white rounded-full transition-colors';
    menu.onclick = openSide;
    if(brand && menu.parentElement !== brand) brand.prepend(menu);

    const actions = header.querySelector('div.flex.items-center.gap-2') || header.lastElementChild;
    if(actions){
      Array.from(actions.querySelectorAll('button')).forEach(b => {
        const on = b.getAttribute('onclick') || '';
        if(on.includes("navigate('settings')") || on.includes('navigate("settings")')) b.style.display = 'none';
        if(b.id === 'feeHeaderCustomersBtn') b.remove();
      });
    }
    updateConnectionChip();
  }

  function runFixes(){
    buildBottomNav();
    ensureSideMenu();
    compactHeader();
    applyActiveBottomNav();
  }

  const oldNavigate = window.navigate;
  if(typeof oldNavigate === 'function' && !oldNavigate.__feeFinalPatched){
    const wrapped = function(screen, params){
      const res = oldNavigate.call(this, screen, params || {});
      setTimeout(runFixes, 0);
      setTimeout(runFixes, 40);
      return res;
    };
    wrapped.__feeFinalPatched = true;
    window.navigate = wrapped;
  }

  const oldRender = window.render;
  if(typeof oldRender === 'function' && !oldRender.__feeFinalPatched){
    const wrappedRender = function(){
      const res = oldRender.apply(this, arguments);
      setTimeout(runFixes, 0);
      setTimeout(runFixes, 50);
      return res;
    };
    wrappedRender.__feeFinalPatched = true;
    window.render = wrappedRender;
  }

  document.addEventListener('click', function(e){
    const menu = e.target.closest && e.target.closest('#feeMenuToggle');
    if(menu){ e.preventDefault(); openSide(); return; }
    const bottomBtn = e.target.closest && e.target.closest('.bottom-nav .nav-btn');
    if(bottomBtn){ setTimeout(applyActiveBottomNav, 0); setTimeout(applyActiveBottomNav, 60); }
  }, true);

  function observeBottom(){
    const nav = document.querySelector('.bottom-nav');
    if(!nav || nav.__feeObservedFinal) return;
    nav.__feeObservedFinal = true;
    new MutationObserver(() => {
      if(navLock) return;
      setTimeout(buildBottomNav, 0);
    }).observe(nav, { childList:true });
  }

  window.addEventListener('online', () => setTimeout(runFixes, 50));
  window.addEventListener('offline', () => setTimeout(runFixes, 50));
  window.addEventListener('DOMContentLoaded', () => setTimeout(()=>{runFixes(); observeBottom();}, 120));
  setTimeout(()=>{runFixes(); observeBottom();}, 80);
  setTimeout(()=>{runFixes(); observeBottom();}, 500);
  setInterval(()=>{updateConnectionChip(); applyActiveBottomNav();}, 1500);
})();
</script>


<script id="fee-scanner-open-above-modals-fix-2026-05-05">
(function(){
  function liftScanner(){
    var page = document.getElementById('feeScannerPage');
    if(!page) return;
    try{ document.body.appendChild(page); }catch(e){}
    page.style.setProperty('z-index','2147483600','important');
    page.style.setProperty('position','fixed','important');
    page.style.setProperty('inset','0','important');
    page.style.setProperty('width','100vw','important');
    page.style.setProperty('height','100dvh','important');
    page.style.setProperty('overflow','hidden','important');
  }

  function patchScannerFns(){
    if(window.__feeScannerTopPatchApplied) return true;
    if(typeof window.openFeeScanner !== 'function' || typeof window.stopFeeScanner !== 'function') return false;
    window.__feeScannerTopPatchApplied = true;
    var originalOpen = window.openFeeScanner;
    var originalStop = window.stopFeeScanner;

    window.openFeeScanner = async function(){
      document.body.classList.add('fee-scanner-open');
      liftScanner();
      try{
        var result = originalOpen.apply(this, arguments);
        liftScanner();
        setTimeout(liftScanner, 25);
        setTimeout(liftScanner, 150);
        setTimeout(liftScanner, 400);
        return await result;
      }catch(err){
        document.body.classList.remove('fee-scanner-open');
        throw err;
      }
    };

    window.stopFeeScanner = async function(){
      try{
        return await originalStop.apply(this, arguments);
      }finally{
        document.body.classList.remove('fee-scanner-open');
      }
    };
    return true;
  }

  function waitPatch(){
    if(patchScannerFns()) return;
    var tries = 0;
    var timer = setInterval(function(){
      tries++;
      if(patchScannerFns() || tries > 80) clearInterval(timer);
    }, 100);
  }

  waitPatch();
  document.addEventListener('click', function(e){
    var btn = e.target && e.target.closest && e.target.closest('[onclick*="openFeeScanner"]');
    if(btn){
      document.body.classList.add('fee-scanner-open');
      setTimeout(liftScanner, 0);
      setTimeout(liftScanner, 120);
    }
  }, true);
})();
</script>
